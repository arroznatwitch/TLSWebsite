<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/x-icon" href="/tlsicon.ico" />
    <title>THE LAST SURVIVOR</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: 'Inter', system-ui, Arial, sans-serif;
        display: flex; align-items: center; justify-content: center;
        padding: 24px; color: #f4f4f5;
        background:
          radial-gradient(900px 500px at 50% -10%, rgba(1,93,78,0.20), transparent 60%),
          #0a0a0a;
      }
      .card {
        max-width: 460px; text-align: center;
        display: flex; flex-direction: column; align-items: center; gap: 16px;
      }
      .logo { width: min(260px, 66vw); height: auto; }
      .bar {
        width: 190px; height: 5px; border-radius: 999px;
        background: rgba(255,255,255,0.10); overflow: hidden;
      }
      .bar span {
        display: block; height: 100%; width: 40%; border-radius: 999px;
        background: #015d4e; box-shadow: 0 0 12px rgba(1,93,78,0.75);
        animation: slide 1.4s ease-in-out infinite;
      }
      @keyframes slide {
        0%   { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
      h1 { font-size: 22px; font-weight: 800; }
      .txt { font-size: 15px; color: #d4d4d8; }
      .sub { font-size: 12px; color: #8a8a92; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/logo.png" alt="The Last Survivor" class="logo" />
      <div class="bar"><span></span></div>
      <h1>Website em manutenção</h1>
      <p class="txt">Estamos a fazer alterações no website. Volta daqui a pouco!</p>
      <p class="sub">
        The website is under maintenance — we&apos;re making some changes. Check back soon.<br />
        El sitio está en mantenimiento — estamos haciendo cambios. Vuelve pronto.
      </p>
    </div>
  </body>
</html>
